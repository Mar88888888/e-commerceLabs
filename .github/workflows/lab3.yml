name: Lab 3 Kubernetes Deployment

on: ['push']

jobs:
  k8s-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create KinD cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kind

      - name: Load image into KinD
        run: |
          docker pull ghcr.io/mar88888888/ecommerce-app:latest
          kind load docker-image ghcr.io/mar88888888/ecommerce-app:latest --name kind

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/infrastructure.yaml
          kubectl apply -f k8s/config.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Run Master Validation Script
        run: |
          chmod +x ./tests/lab3_test.sh
          ./tests/lab3_test.sh

      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods
          kubectl logs deployment/ecommerce-app
          kubectl describe pod -l app=ecommerce-app
